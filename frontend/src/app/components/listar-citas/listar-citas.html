<h2 class="mt-3 fw-bold">Listado de Citas</h2>
<div class="container">
  <table class="table table-striped mt-3">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cita of citas">
        <td>{{ cita.nombre }}</td>
        <td>{{ cita.correo }}</td>
        <td>{{ cita.fecha | date: 'yyyy-MM-dd' }}</td>
        <td>{{ cita.hora }}</td>
        <td>{{ cita.descripcion || 'Sin descripción' }}</td>
        <td>
          <button class="btn btn-primary btn-sm" (click)="verDetalle(cita._id!)">Ver</button>
        </td>
        <td>
          <button class="btn btn-primary btn-sm" (click)="editarCita(cita._id)">Editar</button>
        </td>
        <td>
           <button class="btn btn-primary btn-sm" (click)="eliminarCita(cita._id)"><i class="fa-solid fa-trash"></i></button>
        </td>
      </tr>
    </tbody>
  </table>

  <button class="btn btn-primary fw-bold" (click)="navegar('/agendar-cita')">Agendar Nueva Cita</button>

</div>

<div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="detalleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="detalleModalLabel">Detalle de la Cita</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <app-detalle-cita [cita]="citaSeleccionada"></app-detalle-cita>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editarModal" tabindex="-1" aria-labelledby="editarModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="editarModalLabel">Editar Cita</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <app-agendar-cita [cita]="citaSeleccionada" [esModal]="true"></app-agendar-cita>
      </div>
    </div>
  </div>
</div>
